[project]
name = "short-squeeze-scanner"
version = "1.0.0"
description = "Automated short squeeze setup detector — NYSE/NASDAQ"
requires-python = ">=3.11"
dependencies = [
    "requests>=2.31",
    "beautifulsoup4>=4.12",
    "lxml>=5.0",
    "yfinance>=0.2.36",
    "pandas>=2.1",
    "numpy>=1.26",
    "google-genai>=1.0.0",
    "schedule>=1.2",
    "python-dotenv>=1.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[project.scripts]
scan = "src.main:main"
