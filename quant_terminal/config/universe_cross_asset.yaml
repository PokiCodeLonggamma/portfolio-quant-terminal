# ============================================================================
# CROSS-ASSET UNIVERSE (CDC §1)
# ----------------------------------------------------------------------------
# Taxonomie complète issue du cahier des charges institutionnel.
# Structure :
#   asset_classes:
#     <class_key>:
#       label:        nom affichable
#       icon:         emoji utilisé dans la matrice
#       order:        priorité d'affichage (asc)
#       contracts:
#         - logical:    clé canonique (ex: "ES")
#           name:       nom long ("S&P 500 E-mini")
#           tier:       "standard" | "mini" | "micro"
#           root:       root family (ex: "SP" pour SP/ES/MES)
#           exchange:   "CME" | "CBOT" | "NYMEX" | "COMEX" | "CBOE" | "Eurex"
#                       | "Euronext" | "ICE_EU" | "NASDAQ" | "NYSE_ARCA"
#           yfinance:   symbole yfinance ("ES=F", "VX=F", ...)
#           alpaca:     symbole Alpaca (vide si non listé : futures non US-equity)
#           tradingview: symbole TV ("CME_MINI:ES1!", "CBOE:VX1!", ...)
#           multiplier: multiplicateur du contrat (USD/point ou EUR/point)
#           currency:   "USD" | "EUR" | "GBP" | "CHF"
#           tick_size:  tick (en points)
#           tick_value: valeur du tick (en currency)
#           option_market: true si chaîne d'options listée et liquide
#           notes:      free-form
# ============================================================================

