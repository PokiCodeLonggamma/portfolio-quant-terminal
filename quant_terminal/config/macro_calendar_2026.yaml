# ============================================================================
# Macro catalyst calendar — 2026.
#
# All dates given in ISO format (YYYY-MM-DD).  When an event has a specific
# release time (CPI 08:30 ET, EIA 10:30 ET, FOMC statement 14:00 ET), the
# YAML simply gives the date — the calendar module fills a default UTC time
# per category (08:30 ET = 13:30 UTC for CPI, 10:30 ET = 15:30 UTC for EIA,
# 14:00 ET = 19:00 UTC for FOMC press).
#
# Sources
#   FOMC 2026 schedule  — federalreserve.gov/monetarypolicy/fomccalendars.htm
#   ECB GC 2026 dates   — ecb.europa.eu/press/calendars/mgcgc/html
#   CPI release dates   — bls.gov/schedule/news_release/cpi.htm  (mid-month)
#   EIA weekly status   — eia.gov  (Wednesdays 10:30 ET)
#   OPEC+ JMMC          — opec.org press archive (public schedule)
#   NRC SMR docket      — nrc.gov/reactors/new-reactors/smr.html
# ============================================================================

