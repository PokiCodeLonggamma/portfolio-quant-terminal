# ============================================================================
# Defaults for src.decision.hedge_cost.
#
# - collar: default OTM offsets + tenor for compute_collar
# - linear_alternatives: ticker -> list of {hedge, kind, rationale} fallbacks
#   when the underlying option market is too thin (3x ETPs, commodities).
# ============================================================================

collar:
  dte_days: 90
  call_otm_pct: 0.15
  put_otm_pct: 0.10

linear_alternatives:
  # ── Leveraged London ETFs ─────────────────────────────────────────────
  "3OIL.L":
    - {hedge: USO,    kind: ETF,    rationale: "linear WTI exposure (1x)"}
    - {hedge: "CL=F", kind: future, rationale: "WTI crude futures, no roll drag overnight"}
    - {hedge: SCO,    kind: ETF,    rationale: "inverse WTI (-2x) for short bias"}
  "3DES.L":
    - {hedge: EXSA.DE, kind: ETF,    rationale: "linear DAX exposure"}
    - {hedge: FDAX,    kind: future, rationale: "DAX index future (Eurex)"}
    - {hedge: DAXX.L,  kind: ETF,    rationale: "iShares Core DAX UCITS"}
  "3USL.L":
    - {hedge: SPY,     kind: ETF,    rationale: "S&P 500 linear ETF"}
    - {hedge: "ES=F",  kind: future, rationale: "S&P 500 E-mini future"}
  "3LGO.L":
    - {hedge: GLD,     kind: ETF,    rationale: "linear gold ETF"}
    - {hedge: "GC=F",  kind: future, rationale: "gold futures"}

  # ── Space / new-space single names ────────────────────────────────────
  ASTS:
    - {hedge: ARKX,  kind: ETF, rationale: "ARK Space Exploration — diversified space basket"}
    - {hedge: ITA,   kind: ETF, rationale: "iShares US Aerospace & Defense"}
    - {hedge: QQQ,   kind: ETF, rationale: "broad Nasdaq-100 as systematic-risk hedge"}
  RKLB:
    - {hedge: ARKX,  kind: ETF, rationale: "diversified space exposure"}
    - {hedge: ITA,   kind: ETF, rationale: "aerospace & defense basket"}
    - {hedge: SMH,   kind: ETF, rationale: "semis (high beta to risk-on regime)"}
  RDW:
    - {hedge: ARKX,  kind: ETF, rationale: "space basket diversification"}
    - {hedge: ITA,   kind: ETF, rationale: "aerospace & defense"}
  BKSY:
    - {hedge: ARKX,  kind: ETF, rationale: "space + satellite imagery basket"}

  # ── Quantum / compute single names ────────────────────────────────────
  IONQ:
    - {hedge: QTUM,  kind: ETF, rationale: "Defiance Quantum ETF (diversified)"}
    - {hedge: QQQ,   kind: ETF, rationale: "high-beta tech proxy"}
  QS:
    - {hedge: QQQ,   kind: ETF, rationale: "long-duration tech proxy"}
    - {hedge: ARKK,  kind: ETF, rationale: "innovation basket"}

  # ── Uranium / SMR thesis ──────────────────────────────────────────────
  CCJ:
    - {hedge: URA,   kind: ETF, rationale: "Global X Uranium ETF"}
    - {hedge: URNM,  kind: ETF, rationale: "Sprott Uranium Miners"}
  BWXT:
    - {hedge: ITA,   kind: ETF, rationale: "aerospace & defense"}
    - {hedge: URA,   kind: ETF, rationale: "uranium SMR exposure"}

  # ── AI / optical / photonics single names ─────────────────────────────
  AAOI:
    - {hedge: SMH,   kind: ETF, rationale: "semis — high correlation"}
    - {hedge: SOXX,  kind: ETF, rationale: "iShares Semiconductor"}
  ONDS:
    - {hedge: QQQ,   kind: ETF, rationale: "broad tech proxy"}

  # ── Mega caps ─────────────────────────────────────────────────────────
  GOOG:
    - {hedge: QQQ,   kind: ETF, rationale: "Nasdaq-100 (Google is ~5% weight)"}
    - {hedge: SPY,   kind: ETF, rationale: "broad-market hedge"}
  AAPL:
    - {hedge: QQQ,   kind: ETF, rationale: "Nasdaq-100 (Apple is ~9% weight)"}
