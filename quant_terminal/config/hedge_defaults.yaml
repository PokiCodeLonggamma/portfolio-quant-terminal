  TSLA:
    - {hedge: QQQ,   kind: ETF, rationale: "Nasdaq-100 (Tesla weight)"}
    - {hedge: ARKK,  kind: ETF, rationale: "ARK Innovation — high overlap"}

  # ── Generic sector & broad ETFs (use SPY as macro hedge) ──────────────
  XLE:
    - {hedge: "CL=F", kind: future, rationale: "WTI crude — primary energy driver"}
    - {hedge: USO,    kind: ETF,    rationale: "linear WTI proxy"}
  XLF:
    - {hedge: "ZN=F", kind: future, rationale: "10Y note futures (rate-sensitive)"}
    - {hedge: SPY,    kind: ETF,    rationale: "broad-market hedge"}
  QQQ:
    - {hedge: "NQ=F", kind: future, rationale: "Nasdaq-100 E-mini future"}
    - {hedge: SPY,    kind: ETF,    rationale: "broader market proxy"}
  SPY:
    - {hedge: "ES=F", kind: future, rationale: "S&P 500 E-mini future"}
    - {hedge: VOO,    kind: ETF,    rationale: "Vanguard S&P 500"}
  ARKX:
    - {hedge: ITA,   kind: ETF, rationale: "aerospace & defense alt"}
