# ============================================================================
# Tickers known to live in the portfolio + their canonical metadata.
# - alpaca: symbol passed to Alpaca (US listings). Empty => skip Alpaca.
# - yfinance: symbol used as fallback (works for TSX, EU ETPs, ETCs).
# - currency: trading currency of the listing (used for FX normalization).
# - theme: bucket used in the dashboard.
# - region: geographic bucket.
# ============================================================================

